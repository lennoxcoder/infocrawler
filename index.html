<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>TechNews</title>
    <link rel="icon" type="image/x-icon" href="icone.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 5px;
            align-items: center;
            font-family: sans-serif;
            font-size: 2rem;
            background: #0b3d02;
            color: #ffffff;
        }

        @media (max-width: 800px) {
            header {
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 2px;
                align-items: center;
                margin: 20px;
                padding: 1px;
                font-weight: bold;
            }

            .snippet {
                font-size: 1rem;
            }

            header label {
                margin: 0;
                padding: 2px;
                font-size: 1rem;
            }

        }


        @media (min-width: 801px) {
            header {
                display: flex;
                justify-content: space-between;
                margin: 10px 30px;
                align-items: center;
                padding: 1px;
                font-weight: bold;
            }

            label {
                margin: 1rem;
                font-size: 1.5rem;
            }

        }

        span {
            font-size: small;
        }

        #snipcontainer {
            margin: 10px 30px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .snippet {
            background: #e6f5e6;
            color: #092e03;
            border-radius: 4px;
            padding: 0.5rem;
            font-size: 1rem;
            box-shadow: 6px 6px 8px black;

        }

        .leftcontainer {
            display: flex;
            align-items: center;            
            gap: 0.25rem;
            margin: 1rem;
            padding : 0;            
        }

        .leftcontainer label {
            font-size: 1rem;
        }

        select {
             height: 1.8rem; 
             font-size: 0.8rem;
        }

        .btn-update {
            display: flex;
            height: 2rem; 
            font-size: 1rem;
            white-space: nowrap;
            justify-content: center;
            color: #092e03;
            background-color: #9dec9d;
            margin-left: 2px;
            padding: 4px;    
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;

        }
    </style>

</head>




<body>

    <header>

        <div class="leftcontainer">
            <label for="newsType">Select:</label>
            <select id="newsType">
                <option value="TI">TI</option>
                <option value="Futebol">Futebol</option>
                <option value="Politica">Política</option>
            </select>
            <button onclick="callnews()" class="btn-update">Update</button>
        </div>


        <label id="middle">News</label>
        <span>lennoxcoder@gmail.com</span>
    </header>

    <div id="snipcontainer">
        <div class="snippet">Se a página cair, tente novamente em alguns segundos.</div>
    </div>




</body>

<script>

    function getSelectedNewsType() {
        const selectElement = document.getElementById('newsType');
        const selectedValue = selectElement.value;
        return selectedValue;
    }

    function callnews() {        
        const newsType = getSelectedNewsType();
        window.location.href = `/news?type=${newsType}`;        
    }


</script>


</html>
