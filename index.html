<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>TechNews</title>
    <link rel="icon" type="image/x-icon" href="icone.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            align-items: center;
            font-family: sans-serif;
            font-size: 2rem;
            background: #0b3d02;
            color: #ffffff;
        }

        @media (max-width: 800px) {
            header {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            align-items: center;
            margin: 0px;
            padding: 1px;
            font-weight: bold;
            }
            .snippet {
                font-size: 1rem;
            }
            header label {
                margin: 0;
                padding : 2px;
                font-size: 1rem;            
            }
            header label:first-of-type {
                font-size: 2rem;            
            }

        }


        @media (min-width: 801px) {
            header {
                display: flex;
                justify-content: space-between;
                margin: 1rem;
                align-items: center;
                padding: 1px;
                font-weight: bold;
            }
            label {
            margin: 1rem;
            font-size: 1.5rem;            
        }


        }

        
        #snipcontainer {
            max-width: 90vw;
            margin: 1rem auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .snippet {
            background: #e6f5e6;
            color: #092e03;
            border-radius: 4px;
            padding: 1rem;
            font-size: 1rem;
            box-shadow: 6px 6px 8px black;

        }

        .btn-update {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #092e03;
            background-color: #e6f5e6;
            border: 1px solid #092e03;
            border-radius: 8px;
            margin: auto;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            
        }

        
        

    </style>

</head>




<body>

    <header>
        <label>Last Tech News</label>
        <label>lennoxcoder@gmail.com</label>
    </header>

    <div id="snipcontainer">
        <div class="snippet">Press Update Button...</div>
    </div>

    <button onclick="window.location.href = '/news'" class="btn-update">Update</button>


</body>


</html>
